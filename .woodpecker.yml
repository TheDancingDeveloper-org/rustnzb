when:
  - event: push
    branch: main
  - event: tag
  - event: manual
  - event: pull_request

labels:
  platform: linux/amd64

steps:
  # ─── Quality checks (run on all events) ──────────────────────────────────

  - name: verify-image-pins
    image: repo.indexarr.net/indexarr/rustnzb-ci-core@sha256:63a6ecb9f4897f223419c69bdc1bbae3d930f028955fdaa480fac156daedfb47
    commands:
      - ci/tasks/verify-image-pins

  - name: fmt
    image: repo.indexarr.net/indexarr/rustnzb-ci-core@sha256:63a6ecb9f4897f223419c69bdc1bbae3d930f028955fdaa480fac156daedfb47
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
      RUSTC_WRAPPER: sccache
      SCCACHE_REDIS: "redis://100.92.54.45:6380"
    commands:
      - ci/tasks/fmt
    depends_on:
      - verify-image-pins

  - name: check
    image: repo.indexarr.net/indexarr/rustnzb-ci-core@sha256:63a6ecb9f4897f223419c69bdc1bbae3d930f028955fdaa480fac156daedfb47
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
      RUSTC_WRAPPER: sccache
      SCCACHE_REDIS: "redis://100.92.54.45:6380"
    commands:
      - ci/tasks/check
    depends_on:
      - fmt

  - name: test
    image: repo.indexarr.net/indexarr/rustnzb-ci-core@sha256:63a6ecb9f4897f223419c69bdc1bbae3d930f028955fdaa480fac156daedfb47
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
      RUSTC_WRAPPER: sccache
      SCCACHE_REDIS: "redis://100.92.54.45:6380"
    commands:
      - ci/tasks/test
    depends_on:
      - check

  - name: frontend-test
    image: repo.indexarr.net/indexarr/rustnzb-ci-core@sha256:63a6ecb9f4897f223419c69bdc1bbae3d930f028955fdaa480fac156daedfb47
    commands:
      - ci/tasks/frontend-test
    depends_on:
      - test

  - name: frontend-audit
    image: repo.indexarr.net/indexarr/rustnzb-ci-core@sha256:63a6ecb9f4897f223419c69bdc1bbae3d930f028955fdaa480fac156daedfb47
    commands:
      - ci/tasks/frontend-audit
    depends_on:
      - frontend-test

  - name: desktop-test
    image: repo.indexarr.net/indexarr/rustnzb-ci-desktop@sha256:8c5b1fdee2c79a48b555a246e0804547488ba46e9b69d2094d6b033862bde2ae
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - ci/tasks/desktop-test
    depends_on:
      - frontend-audit

  - name: clippy
    image: repo.indexarr.net/indexarr/rustnzb-ci-core@sha256:63a6ecb9f4897f223419c69bdc1bbae3d930f028955fdaa480fac156daedfb47
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
      RUSTC_WRAPPER: sccache
      SCCACHE_REDIS: "redis://100.92.54.45:6380"
    commands:
      - ci/tasks/clippy
    depends_on:
      - desktop-test

  # ─── Playwright E2E (push, PR, manual) ───────────────────────────────────
  # Builds the frontend + debug binary, then runs every deterministic
  # Playwright project (seeded, first-boot/auth, and mock-download).
  - name: e2e
    image: repo.indexarr.net/indexarr/rustnzb-ci-e2e@sha256:76cdc92ce89bd37dc9d5b533fc63562b5a76f2c25885f7fb73a40ddbd75e1623
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
      RUSTC_WRAPPER: sccache
      SCCACHE_REDIS: "redis://100.92.54.45:6380"
    when:
      - event: push
        branch: main
      - event: pull_request
      - event: manual
    commands:
      - ci/tasks/e2e
    depends_on:
      - clippy

  # ─── Build (push to main + tags only) ────────────────────────────────────

  - name: build-linux
    image: repo.indexarr.net/indexarr/rustnzb-ci-core@sha256:63a6ecb9f4897f223419c69bdc1bbae3d930f028955fdaa480fac156daedfb47
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
      RUSTC_WRAPPER: sccache
      SCCACHE_REDIS: "redis://100.92.54.45:6380"
    commands:
      - ci/tasks/build-linux
    depends_on:
      - clippy
    when:
      - event: push
        branch: main
      - event: tag
      - event: manual

  - name: build-linux-arm64
    image: repo.indexarr.net/indexarr/rustnzb-ci-cross@sha256:89f1f570acb0f8e6514ffcca39bd9f26305263d95274e4c170eedf867d113ad9
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
      RUSTC_WRAPPER: sccache
      SCCACHE_REDIS: "redis://100.92.54.45:6380"
    commands:
      - ci/tasks/build-linux-arm64
    depends_on:
      - build-linux
    when:
      - event: push
        branch: main
      - event: tag
      - event: manual

  - name: build-windows
    image: repo.indexarr.net/indexarr/rustnzb-ci-cross@sha256:89f1f570acb0f8e6514ffcca39bd9f26305263d95274e4c170eedf867d113ad9
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
      RUSTC_WRAPPER: sccache
      SCCACHE_REDIS: "redis://100.92.54.45:6380"
    commands:
      - ci/tasks/build-windows
    depends_on:
      - build-linux-arm64
    when:
      - event: push
        branch: main
      - event: tag
      - event: manual

  - name: package-release
    image: repo.indexarr.net/indexarr/rustnzb-ci-cross@sha256:89f1f570acb0f8e6514ffcca39bd9f26305263d95274e4c170eedf867d113ad9
    depends_on:
      - build-linux
      - build-linux-arm64
      - build-windows
    commands:
      - ci/tasks/package-release
    when:
      - event: tag

  # ─── Publish artifacts (tags only) ───────────────────────────────────────

  - name: publish-release
    image: alpine@sha256:fd791d74b68913cbb027c6546007b3f0d3bc45125f797758156952bc2d6daf40
    when:
      - event: tag
    depends_on:
      - verify-release-images
    environment:
      DEPLOY_SSH_KEY:
        from_secret: deploy_ssh_key
    commands:
      - apk add --no-cache openssh-client coreutils
      - cd .ci-output/packages
      - mkdir -p ~/.ssh && chmod 700 ~/.ssh
      - printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
      - chmod 600 ~/.ssh/id_ed25519
      - printf 'StrictHostKeyChecking no\nUserKnownHostsFile /dev/null\nLogLevel ERROR\n' > ~/.ssh/config
      - |
        set -ex
        TAG="$CI_COMMIT_TAG"
        ARTEFACTS="rustnzb-$TAG-linux-x86_64.tar.gz rustnzb-$TAG-linux-aarch64.tar.gz rustnzb-$TAG-windows-x86_64-setup.exe rustnzb-$TAG-amd64.deb rustnzb-$TAG-arm64.deb"
        echo "=== Artifacts in workspace ==="
        ls -lh $ARTEFACTS
        echo "Publishing release $TAG"
        sha256sum $ARTEFACTS > "SHA256SUMS-$TAG.txt"
        ls -lh "SHA256SUMS-$TAG.txt"
        ssh -i ~/.ssh/id_ed25519 -F ~/.ssh/config root@100.92.4.57 "mkdir -p /root/downloads/rustnzb/$TAG"
        scp -O -F ~/.ssh/config -i ~/.ssh/id_ed25519 $ARTEFACTS "SHA256SUMS-$TAG.txt" root@100.92.4.57:/root/downloads/rustnzb/$TAG/
        ssh -i ~/.ssh/id_ed25519 -F ~/.ssh/config root@100.92.4.57 "ln -sfn $TAG /root/downloads/rustnzb/latest"
        echo "Published https://dl.rustnzb.dev/latest/"

  - name: forgejo-release
    image: alpine@sha256:fd791d74b68913cbb027c6546007b3f0d3bc45125f797758156952bc2d6daf40
    when:
      - event: tag
    depends_on:
      - verify-release-images
    environment:
      FORGEJO_TOKEN:
        from_secret: git_auth_token
    commands:
      - apk add --no-cache curl jq
      - cd .ci-output/packages
      - |
        TAG="$CI_COMMIT_TAG"
        API="https://repo.indexarr.net/api/v1"
        REPO="indexarr/rustnzb"
        NOTES="$CI_WORKSPACE/RELEASE_NOTES_$TAG.md"
        test -f "$NOTES"
        # stable if tag has no alpha/beta/rc suffix
        echo "$TAG" | grep -qE '(alpha|beta|rc)' && PRERELEASE=true || PRERELEASE=false
        echo "Creating Forgejo release $TAG (prerelease=$PRERELEASE)"

        EXISTING_ID=$(curl -s -H "Authorization: token $FORGEJO_TOKEN" \
          "$API/repos/$REPO/releases/tags/$TAG" | jq -r '.id // empty')
        if [ -n "$EXISTING_ID" ]; then
          curl -s -X DELETE -H "Authorization: token $FORGEJO_TOKEN" \
            "$API/repos/$REPO/releases/$EXISTING_ID"
        fi

        jq -n \
          --arg tag "$TAG" \
          --arg name "rustnzb $TAG" \
          --rawfile body "$NOTES" \
          --argjson prerelease "$PRERELEASE" \
          '{tag_name:$tag,name:$name,body:$body,draft:false,prerelease:$prerelease}' \
          > /tmp/forgejo-release.json
        RELEASE_ID=$(curl -s -X POST \
          -H "Authorization: token $FORGEJO_TOKEN" \
          -H "Content-Type: application/json" \
          --data-binary @/tmp/forgejo-release.json \
          "$API/repos/$REPO/releases" | jq -r '.id')

        [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ] && { echo "ERROR: Failed to create Forgejo release"; exit 1; }
        echo "Forgejo release created: ID=$RELEASE_ID"

        for file in \
          "rustnzb-$TAG-linux-x86_64.tar.gz" \
          "rustnzb-$TAG-linux-aarch64.tar.gz" \
          "rustnzb-$TAG-windows-x86_64-setup.exe" \
          "rustnzb-$TAG-amd64.deb" \
          "rustnzb-$TAG-arm64.deb" \
          "SHA256SUMS-$TAG.txt"; do
          [ -f "$file" ] || continue
          echo "Uploading $file"
          curl -sf -X POST \
            -H "Authorization: token $FORGEJO_TOKEN" \
            -F "attachment=@$file" \
            "$API/repos/$REPO/releases/$RELEASE_ID/assets" > /dev/null
        done
        echo "Forgejo release $TAG complete"

  # ─── Docker (push to main = dev+sha; tag = version+latest) ───────────────

  # Main-branch image is amd64-only. The arm64 cross-compile (vendored
  # OpenSSL + aws-lc-sys + zstd, all built from C) exhausts the buildx
  # plugin's in-container overlayfs at ~110s (`No space left on device`),
  # and splitting per-arch didn't help because the plugin spins up its own
  # dockerd per step. Multi-arch is only needed for tagged releases (GHCR
  # publish) — until that's reworked to use prebuilt binaries, main pushes
  # only produce :dev / :sha for amd64.
  - name: build-and-push-dev
    image: woodpeckerci/plugin-docker-buildx@sha256:9a22c00b4952e405d11e66d29772edbeb1f7b24f27f71cda251ecb838e725e86
    when:
      - event: push
        branch: main
    depends_on:
      - build-linux
      - e2e
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - RUSTNZB_BUILD_REF="${CI_COMMIT_SHA}" RUSTNZB_PUSH=true RUSTNZB_CACHE_IMAGE=repo.indexarr.net/indexarr/rustnzbd:buildcache-amd64 ci/tasks/build-image "repo.indexarr.net/indexarr/rustnzbd:${CI_COMMIT_SHA}"

  - name: smoke-dev-image
    image: repo.indexarr.net/indexarr/rustnzb-ci-cross@sha256:89f1f570acb0f8e6514ffcca39bd9f26305263d95274e4c170eedf867d113ad9
    when:
      - event: push
        branch: main
    depends_on:
      - build-and-push-dev
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - ci/tasks/smoke-runtime "repo.indexarr.net/indexarr/rustnzbd:${CI_COMMIT_SHA}" "${CI_COMMIT_SHA}"

  - name: promote-dev
    image: repo.indexarr.net/indexarr/rustnzb-ci-cross@sha256:89f1f570acb0f8e6514ffcca39bd9f26305263d95274e4c170eedf867d113ad9
    when:
      - event: push
        branch: main
    depends_on:
      - smoke-dev-image
    environment:
      GH_TOKEN:
        from_secret: gh_release_token
      FORGEJO_TOKEN:
        from_secret: git_auth_token
    commands:
      - ci/tasks/promote-dev

  - name: mirror-github-main
    image: repo.indexarr.net/indexarr/rustnzb-ci-core@sha256:63a6ecb9f4897f223419c69bdc1bbae3d930f028955fdaa480fac156daedfb47
    when:
      - event: push
        branch: main
    depends_on:
      - promote-dev
      - build-windows
    environment:
      GH_TOKEN:
        from_secret: gh_release_token
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - ci/tasks/mirror-github branch

  - name: build-and-push-release-amd64
    image: woodpeckerci/plugin-docker-buildx@sha256:9a22c00b4952e405d11e66d29772edbeb1f7b24f27f71cda251ecb838e725e86
    when:
      - event: tag
    depends_on:
      - package-release
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - RUSTNZB_BUILD_REF="${CI_COMMIT_TAG}" RUSTNZB_PLATFORM=linux/amd64 RUSTNZB_PUSH=true RUSTNZB_CACHE_IMAGE=repo.indexarr.net/indexarr/rustnzbd:buildcache-amd64 ci/tasks/build-image "repo.indexarr.net/indexarr/rustnzbd:${CI_COMMIT_TAG}-amd64"

  - name: build-and-push-release-arm64
    image: woodpeckerci/plugin-docker-buildx@sha256:9a22c00b4952e405d11e66d29772edbeb1f7b24f27f71cda251ecb838e725e86
    when:
      - event: tag
    depends_on:
      - package-release
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - RUSTNZB_BUILD_REF="${CI_COMMIT_TAG}" RUSTNZB_PLATFORM=linux/arm64 RUSTNZB_PUSH=true RUSTNZB_CACHE_IMAGE=repo.indexarr.net/indexarr/rustnzbd:buildcache-arm64 ci/tasks/build-image "repo.indexarr.net/indexarr/rustnzbd:${CI_COMMIT_TAG}-arm64"

  # One-shot recovery for v1.3.0 after the original tag pipeline packaged all
  # native artifacts but the legacy Docker plugin secret syntax failed. Remove
  # after pipeline 222 has been fully recovered and verified.
  - name: recover-v1.3.0
    image: alpine@sha256:fd791d74b68913cbb027c6546007b3f0d3bc45125f797758156952bc2d6daf40
    when:
      - event: manual
    environment:
      GH_TOKEN:
        from_secret: gh_release_token
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
      DEPLOY_SSH_KEY:
        from_secret: deploy_ssh_key
    commands:
      - apk add --no-cache curl git jq openssh-client skopeo coreutils
      - ci/tasks/recover-v1.3.0

  - name: smoke-release-amd64
    image: repo.indexarr.net/indexarr/rustnzb-ci-cross@sha256:89f1f570acb0f8e6514ffcca39bd9f26305263d95274e4c170eedf867d113ad9
    when:
      - event: tag
    depends_on:
      - build-and-push-release-amd64
      - build-and-push-release-arm64
    environment:
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    commands:
      - ci/tasks/smoke-runtime "repo.indexarr.net/indexarr/rustnzbd:${CI_COMMIT_TAG}-amd64" "${CI_COMMIT_TAG}"

  - name: manifest-release
    image: mplatform/manifest-tool@sha256:566f66687564e125c43bb86e2d035ad9b7fb4449f38814535b691d1a7f8d20db
    when:
      - event: tag
    depends_on:
      - smoke-release-amd64
    environment:
      REGISTRY_TOKEN:
        from_secret: git_auth_token
    commands:
      - |
        manifest-tool --username x-access-token --password "$REGISTRY_TOKEN" \
          push from-args \
          --platforms linux/amd64,linux/arm64 \
          --template repo.indexarr.net/indexarr/rustnzbd:${CI_COMMIT_TAG}-ARCH \
          --target repo.indexarr.net/indexarr/rustnzbd:${CI_COMMIT_TAG}

  - name: push-ghcr
    image: quay.io/skopeo/stable@sha256:c7d3c512612f52805023cd38351081dad7e2729fc13d14b701e47c7c8bdd6615
    when:
      - event: tag
    depends_on:
      - manifest-release
    environment:
      GH_TOKEN:
        from_secret: gh_release_token
      FORGEJO_TOKEN:
        from_secret: git_auth_token
    commands:
      - SRC="docker://repo.indexarr.net/indexarr/rustnzbd:$CI_COMMIT_TAG"
      - SRC_CREDS="--src-creds=$FORGEJO_TOKEN:$FORGEJO_TOKEN"
      - DST_CREDS="--dest-creds=AusAgentSmith:$GH_TOKEN"
      - skopeo copy --multi-arch all $SRC_CREDS --dest-creds "$FORGEJO_TOKEN:$FORGEJO_TOKEN" $SRC "docker://repo.indexarr.net/indexarr/rustnzbd:latest"
      - skopeo copy --multi-arch all $SRC_CREDS $DST_CREDS $SRC "docker://ghcr.io/ausagentsmith-org/rustnzb:$CI_COMMIT_TAG"
      - skopeo copy --multi-arch all $SRC_CREDS $DST_CREDS $SRC "docker://ghcr.io/ausagentsmith-org/rustnzb:latest"

  - name: verify-release-images
    image: quay.io/skopeo/stable@sha256:c7d3c512612f52805023cd38351081dad7e2729fc13d14b701e47c7c8bdd6615
    when:
      - event: tag
    depends_on:
      - push-ghcr
    environment:
      GH_TOKEN:
        from_secret: gh_release_token
      FORGEJO_TOKEN:
        from_secret: git_auth_token
    commands:
      - skopeo inspect --creds "$FORGEJO_TOKEN:$FORGEJO_TOKEN" --override-arch amd64 "docker://repo.indexarr.net/indexarr/rustnzbd:${CI_COMMIT_TAG}" > /dev/null
      - skopeo inspect --creds "$FORGEJO_TOKEN:$FORGEJO_TOKEN" --override-arch arm64 "docker://repo.indexarr.net/indexarr/rustnzbd:${CI_COMMIT_TAG}" > /dev/null
      - skopeo inspect --creds "$FORGEJO_TOKEN:$FORGEJO_TOKEN" --override-arch amd64 "docker://repo.indexarr.net/indexarr/rustnzbd:latest" > /dev/null
      - skopeo inspect --creds "$FORGEJO_TOKEN:$FORGEJO_TOKEN" --override-arch arm64 "docker://repo.indexarr.net/indexarr/rustnzbd:latest" > /dev/null
      - skopeo inspect --creds "AusAgentSmith:$GH_TOKEN" --override-arch amd64 "docker://ghcr.io/ausagentsmith-org/rustnzb:${CI_COMMIT_TAG}" > /dev/null
      - skopeo inspect --creds "AusAgentSmith:$GH_TOKEN" --override-arch arm64 "docker://ghcr.io/ausagentsmith-org/rustnzb:${CI_COMMIT_TAG}" > /dev/null
      - skopeo inspect --creds "AusAgentSmith:$GH_TOKEN" --override-arch amd64 "docker://ghcr.io/ausagentsmith-org/rustnzb:latest" > /dev/null
      - skopeo inspect --creds "AusAgentSmith:$GH_TOKEN" --override-arch arm64 "docker://ghcr.io/ausagentsmith-org/rustnzb:latest" > /dev/null

  - name: mirror-github-tag
    image: repo.indexarr.net/indexarr/rustnzb-ci-core@sha256:63a6ecb9f4897f223419c69bdc1bbae3d930f028955fdaa480fac156daedfb47
    when:
      - event: tag
    depends_on:
      - verify-release-images
    environment:
      GH_TOKEN:
        from_secret: gh_release_token
      GIT_AUTH_TOKEN:
        from_secret: git_auth_token
    commands:
      - ci/tasks/mirror-github tag

  - name: github-release
    image: alpine@sha256:fd791d74b68913cbb027c6546007b3f0d3bc45125f797758156952bc2d6daf40
    when:
      - event: tag
    depends_on:
      - mirror-github-tag
    environment:
      GH_TOKEN:
        from_secret: gh_release_token
    commands:
      - apk add --no-cache curl jq
      - cd .ci-output/packages
      - |
        TAG="$CI_COMMIT_TAG"
        REPO="AusAgentSmith-org/rustnzb"
        NOTES="$CI_WORKSPACE/RELEASE_NOTES_$TAG.md"
        test -f "$NOTES"
        echo "$TAG" | grep -qE '(alpha|beta|rc)' && PRERELEASE=true || PRERELEASE=false
        echo "Creating GitHub release $TAG (prerelease=$PRERELEASE)"

        EXISTING_ID=$(curl -s -H "Authorization: token $GH_TOKEN" \
          "https://api.github.com/repos/$REPO/releases/tags/$TAG" | jq -r '.id // empty')
        if [ -n "$EXISTING_ID" ]; then
          curl -s -X DELETE -H "Authorization: token $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/$EXISTING_ID"
        fi

        jq -n \
          --arg tag "$TAG" \
          --arg name "rustnzb $TAG" \
          --rawfile body "$NOTES" \
          --argjson prerelease "$PRERELEASE" \
          '{tag_name:$tag,target_commitish:"main",name:$name,body:$body,draft:false,prerelease:$prerelease}' \
          > /tmp/github-release.json
        RELEASE_ID=$(curl -s -X POST \
          -H "Authorization: token $GH_TOKEN" \
          -H "Content-Type: application/json" \
          --data-binary @/tmp/github-release.json \
          "https://api.github.com/repos/$REPO/releases" | jq -r '.id')

        [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "null" ] && { echo "ERROR: Failed to create GitHub release"; exit 1; }
        echo "GitHub release created: ID=$RELEASE_ID"

        for file in \
          "rustnzb-$TAG-linux-x86_64.tar.gz" \
          "rustnzb-$TAG-linux-aarch64.tar.gz" \
          "rustnzb-$TAG-windows-x86_64-setup.exe" \
          "rustnzb-$TAG-amd64.deb" \
          "rustnzb-$TAG-arm64.deb" \
          "SHA256SUMS-$TAG.txt"; do
          [ -f "$file" ] || continue
          echo "Uploading $file"
          curl -sf -X POST \
            -H "Authorization: token $GH_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary "@$file" \
            "https://uploads.github.com/repos/$REPO/releases/$RELEASE_ID/assets?name=$file" > /dev/null
        done
        echo "GitHub release $TAG complete"

  # ─── Discord notifications ────────────────────────────────────────────────

  - name: discord-success
    image: alpine/curl@sha256:71597a4f6ac6c7515c77084d2a216aa2f302cd6f9ec311d2f55eb9320f161ce2
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        HASH=$(echo $CI_COMMIT_SHA | head -c 7)
        curl -sf -H "Content-Type: application/json" -d "{
          \"embeds\": [{
            \"title\": \"Build Successful\",
            \"description\": \"**${CI_REPO}** — [$HASH]($CI_REPO_URL/commit/$CI_COMMIT_SHA)\",
            \"color\": 5025616,
            \"footer\": {\"text\": \"$CI_REPO • $CI_COMMIT_AUTHOR\"},
            \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
          }]
        }" "$DISCORD_WEBHOOK_URL" || true
    when:
      - status: [success]

  - name: discord-failure
    image: alpine/curl@sha256:71597a4f6ac6c7515c77084d2a216aa2f302cd6f9ec311d2f55eb9320f161ce2
    environment:
      DISCORD_WEBHOOK_URL:
        from_secret: discord_webhook_url
    commands:
      - |
        HASH=$(echo $CI_COMMIT_SHA | head -c 7)
        curl -sf -H "Content-Type: application/json" -d "{
          \"embeds\": [{
            \"title\": \"Build Failed\",
            \"description\": \"**${CI_REPO}** — [$HASH]($CI_REPO_URL/commit/$CI_COMMIT_SHA)\",
            \"color\": 15548997,
            \"footer\": {\"text\": \"$CI_REPO • $CI_COMMIT_AUTHOR\"},
            \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
          }]
        }" "$DISCORD_WEBHOOK_URL" || true
    when:
      - status: [failure]
