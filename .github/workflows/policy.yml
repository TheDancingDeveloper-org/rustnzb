name: Migration policy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  policy:
    runs-on: [self-hosted, node-b, linux, x64, rust]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Verify migration policies
        shell: bash
        run: bash ci/migration-policy.sh
