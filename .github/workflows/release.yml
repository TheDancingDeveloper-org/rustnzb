name: Release delivery

on:
  push:
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: rustnzb-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify-release-ref:
    runs-on: [self-hosted, node-b, linux, x64, rust]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Require a version tag reachable from protected main
        run: |
          test "${GITHUB_REF_TYPE}" = tag
          case "${GITHUB_REF_NAME}" in v[0-9]*) ;; *) exit 1 ;; esac
          git fetch --no-tags origin main
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main

  release-image:
    needs: verify-release-ref
    permissions:
      contents: read
      packages: write
    runs-on: [self-hosted, node-b, linux, x64, publish, docker]
    env:
      IMAGE: ghcr.io/thedancingdeveloper-org/rustnzbd
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: repo.indexarr.net
          username: x-access-token
          password: ${{ secrets.FORGEJO_CARGO_TOKEN }}
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and publish multi-architecture release image once
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          build-args: |
            RUSTNZB_BUILD_REF=${{ github.ref_name }}
            RELEASE_OPTIMIZED=true
          secrets: |
            forgejo_token=${{ secrets.FORGEJO_CARGO_TOKEN }}
          cache-from: ''
          cache-to: ''
      - name: Smoke-test the exact amd64 release image
        env:
          GIT_AUTH_TOKEN: ${{ secrets.FORGEJO_CARGO_TOKEN }}
        run: ci/tasks/smoke-runtime "$IMAGE:${GITHUB_REF_NAME}" "${GITHUB_REF_NAME}"
      - name: Make the end-user package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -fsS -X PATCH \
            -H 'Accept: application/vnd.github+json' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            -H 'Content-Type: application/json' \
            --data '{"visibility":"public"}' \
            'https://api.github.com/orgs/TheDancingDeveloper-org/packages/container/rustnzbd' >/dev/null
      - name: Verify anonymous amd64 and arm64 manifests
        run: |
          token=$(curl -fsS 'https://ghcr.io/token?service=ghcr.io&scope=repository:thedancingdeveloper-org/rustnzbd:pull' | jq -r .token)
          test -n "$token"
          curl -fsS -H "Authorization: Bearer $token" \
            -H 'Accept: application/vnd.oci.image.index.v1+json, application/vnd.docker.distribution.manifest.list.v2+json' \
            "$IMAGE_MANIFEST" > manifest.json
          jq -e '.manifests | map(.platform.architecture) | index("amd64") != null' manifest.json
          jq -e '.manifests | map(.platform.architecture) | index("arm64") != null' manifest.json
        env:
          IMAGE_MANIFEST: https://ghcr.io/v2/thedancingdeveloper-org/rustnzbd/manifests/${{ github.ref_name }}
      - name: Copy the same release manifest to the Forgejo rollback registry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_CARGO_TOKEN }}
          SKOPEO_IMAGE: quay.io/skopeo/stable@sha256:c7d3c512612f52805023cd38351081dad7e2729fc13d14b701e47c7c8bdd6615
        run: |
          docker run --rm \
            -e GH_TOKEN -e FORGEJO_TOKEN -e GITHUB_ACTOR -e GITHUB_REF_NAME \
            "$SKOPEO_IMAGE" sh -ec '
              src="docker://ghcr.io/thedancingdeveloper-org/rustnzbd:$GITHUB_REF_NAME"
              dst="docker://repo.indexarr.net/indexarr/rustnzbd:$GITHUB_REF_NAME"
              skopeo copy --multi-arch all \
                --src-creds "$GITHUB_ACTOR:$GH_TOKEN" \
                --dest-creds "$FORGEJO_TOKEN:$FORGEJO_TOKEN" "$src" "$dst"
              skopeo copy --multi-arch all \
                --src-creds "$GITHUB_ACTOR:$GH_TOKEN" \
                --dest-creds "$FORGEJO_TOKEN:$FORGEJO_TOKEN" "$src" \
                docker://repo.indexarr.net/indexarr/rustnzbd:latest
              src_digest=$(skopeo inspect --creds "$GITHUB_ACTOR:$GH_TOKEN" --format "{{.Digest}}" "$src")
              dst_digest=$(skopeo inspect --creds "$FORGEJO_TOKEN:$FORGEJO_TOKEN" --format "{{.Digest}}" "$dst")
              test "$src_digest" = "$dst_digest"
              printf "Verified identical GHCR/Forgejo release digest %s\n" "$src_digest"
            '
      - name: Copy the same release manifest to the old public GHCR namespace
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OLD_GHCR_TOKEN: ${{ secrets.OLD_GHCR_TOKEN }}
          SKOPEO_IMAGE: quay.io/skopeo/stable@sha256:c7d3c512612f52805023cd38351081dad7e2729fc13d14b701e47c7c8bdd6615
        run: |
          docker run --rm \
            -e GH_TOKEN -e OLD_GHCR_TOKEN -e GITHUB_ACTOR -e GITHUB_REF_NAME \
            "$SKOPEO_IMAGE" sh -ec '
              src="docker://ghcr.io/thedancingdeveloper-org/rustnzbd:$GITHUB_REF_NAME"
              dst="docker://ghcr.io/ausagentsmith-org/rustnzb:$GITHUB_REF_NAME"
              skopeo copy --multi-arch all \
                --src-creds "$GITHUB_ACTOR:$GH_TOKEN" \
                --dest-creds "AusAgentSmith:$OLD_GHCR_TOKEN" "$src" "$dst"
              skopeo copy --multi-arch all \
                --src-creds "$GITHUB_ACTOR:$GH_TOKEN" \
                --dest-creds "AusAgentSmith:$OLD_GHCR_TOKEN" "$src" \
                docker://ghcr.io/ausagentsmith-org/rustnzb:latest
              src_digest=$(skopeo inspect --creds "$GITHUB_ACTOR:$GH_TOKEN" --format "{{.Digest}}" "$src")
              dst_digest=$(skopeo inspect --creds "AusAgentSmith:$OLD_GHCR_TOKEN" --format "{{.Digest}}" "$dst")
              test "$src_digest" = "$dst_digest"
              printf "Verified identical new/old GHCR release digest %s\n" "$src_digest"
            '

  release-assets:
    needs: verify-release-ref
    permissions:
      contents: write
    runs-on: [self-hosted, node-b, linux, x64, publish, docker]
    env:
      CROSS_IMAGE: repo.indexarr.net/indexarr/rustnzb-ci-cross@sha256:89f1f570acb0f8e6514ffcca39bd9f26305263d95274e4c170eedf867d113ad9
    steps:
      - uses: actions/checkout@v7
      - name: Build Linux, arm64, Windows, and package artifacts
        env:
          GIT_AUTH_TOKEN: ${{ secrets.FORGEJO_CARGO_TOKEN }}
        run: |
          printf '%s' "$GIT_AUTH_TOKEN" | docker login repo.indexarr.net --username x-access-token --password-stdin >/dev/null
          container="rustnzb-release-assets-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          cleanup() { docker rm -f "$container" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          docker create --name "$container" -w /workspace \
            -e GIT_AUTH_TOKEN -e CI_COMMIT_SHA="$GITHUB_SHA" \
            -e CI_COMMIT_TAG="$GITHUB_REF_NAME" -e CI_PIPELINE_NUMBER="$GITHUB_RUN_ID" \
            "$CROSS_IMAGE" sh -ec '
              ci/tasks/frontend-build
              ci/tasks/build-linux
              ci/tasks/build-linux-arm64
              ci/tasks/build-windows
              ci/tasks/package-release
            ' >/dev/null
          docker cp . "$container:/workspace"
          docker start -a "$container"
          mkdir -p .ci-output/packages
          docker cp "$container:/workspace/.ci-output/packages/." .ci-output/packages/
          (cd .ci-output/packages && sha256sum -c "SHA256SUMS-${GITHUB_REF_NAME}.txt")
      - uses: actions/upload-artifact@v4
        with:
          name: rustnzb-${{ github.ref_name }}-release-assets
          path: .ci-output/packages/*
          if-no-files-found: error
          retention-days: 30
      - name: Create or update the GitHub release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          api="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          auth=(-H 'Accept: application/vnd.github+json' -H "Authorization: Bearer $GH_TOKEN" -H 'X-GitHub-Api-Version: 2022-11-28')
          prerelease=false
          case "$GITHUB_REF_NAME" in *alpha*|*beta*|*rc*) prerelease=true ;; esac
          release_id=$(curl -fsS "${auth[@]}" "$api/releases/tags/$GITHUB_REF_NAME" | jq -r .id 2>/dev/null || true)
          if [ -z "$release_id" ] || [ "$release_id" = null ]; then
            payload=$(jq -nc --arg tag "$GITHUB_REF_NAME" --argjson pre "$prerelease" \
              '{tag_name:$tag,name:("rustnzb "+$tag),draft:false,prerelease:$pre,generate_release_notes:true}')
            release_id=$(curl -fsS -X POST "${auth[@]}" -H 'Content-Type: application/json' \
              --data "$payload" "$api/releases" | jq -r .id)
          fi
          test -n "$release_id"
          for file in .ci-output/packages/rustnzb-* .ci-output/packages/SHA256SUMS-*; do
            name=$(basename "$file")
            old_id=$(curl -fsS "${auth[@]}" "$api/releases/$release_id/assets?per_page=100" \
              | jq -r --arg name "$name" '.[] | select(.name==$name) | .id' | head -n1)
            if [ -n "$old_id" ]; then
              curl -fsS -X DELETE "${auth[@]}" "$api/releases/assets/$old_id" >/dev/null
            fi
            curl -fsS -X POST "${auth[@]}" -H 'Content-Type: application/octet-stream' \
              --data-binary "@$file" \
              "https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases/$release_id/assets?name=$name" >/dev/null
          done
