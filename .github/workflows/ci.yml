name: CI

on:
  push:
    branches: [main]
    paths-ignore: ["*.md", "docs/**", "AGENTS.md", "CONTRIBUTING.md", "SECURITY.md"]
  pull_request:
    paths-ignore: ["*.md", "docs/**", "AGENTS.md", "CONTRIBUTING.md", "SECURITY.md"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    runs-on: [self-hosted, node-b, linux, x64, rust]
    env:
      FORGEJO_CARGO_TOKEN: ${{ secrets.FORGEJO_CARGO_TOKEN }}
      CARGO_BUILD_JOBS: 1
    steps:
      - uses: actions/checkout@v7
      - name: Configure Cargo credentials
        run: |
          export CARGO_HOME="$RUNNER_TEMP/cargo-home"
          mkdir -p "$CARGO_HOME"
          printf '[registries.forgejo]\ntoken = "Bearer %s"\n' "$FORGEJO_CARGO_TOKEN" > "$CARGO_HOME/credentials.toml"
          chmod 600 "$CARGO_HOME/credentials.toml"
          test -n "$FORGEJO_CARGO_TOKEN"
          echo "CARGO_HOME=$CARGO_HOME" >> "$GITHUB_ENV"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.88
          components: rustfmt,clippy
      - run: cargo fmt --all --check
      - run: cargo check --workspace --all-targets
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  frontend:
    runs-on: [self-hosted, node-b, linux, x64, rust]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/rustnzb/frontend/package-lock.json
      - working-directory: apps/rustnzb/frontend
        run: npm ci --no-audit --no-fund
      - working-directory: apps/rustnzb/frontend
        run: npm test -- --watch=false
      - working-directory: apps/rustnzb/frontend
        run: npm run build -- --configuration=production
